<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PrixDenrées{% endblock %} - Suivi des prix alimentaires</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-graph-up-arrow me-2"></i>
                <span>PrixDenrées</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/collecte"><i class="bi bi-pencil-square"></i> Collecte</a></li>
                    <li class="nav-item"><a class="nav-link" href="/donnees-page"><i class="bi bi-table"></i> Données</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analytics"><i class="bi bi-bar-chart"></i> Analyses</a></li>
                    <li class="nav-item"><a class="nav-link" href="/avance"><i class="bi bi-cpu"></i> Avancé</a></li>
                    <li class="nav-item"><a class="nav-link" href="/report"><i class="bi bi-file-earmark-text"></i> Rapport</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about"><i class="bi bi-info-circle"></i> À propos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light py-3 mt-5">
        <div class="container text-center">
            <small>&copy; 2025 PrixDenrées - INF232 - Suivi des prix des denrées alimentaires au Cameroun</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
